# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"

title                    : "Dr. Zeeshan Ahmad Arfeen"
title_separator          : "-"
name                     : "Dr. Zeeshan Ahmad Arfeen"
description              : "Academic portfolio of Dr. Zeeshan Ahmad Arfeen"

url                      : https://zeeshanahmadarfeen.github.io
baseurl                  : ""
repository               : "ZeeshanAhmadArfeen/ZeeshanAhmadArfeen.github.io"

# Author Information
author:
  avatar           : "profile.png"
  name             : "Dr. Zeeshan Ahmad Arfeen"
  pronouns         :
  bio              : "Assistant Professor, Electrical Power Engineering"
  location         : "Bahawalpur, Pakistan"
  employer         : "The Islamia University of Bahawalpur"
  uri              : "https://www.iub.edu.pk"
  email            : "zeeshan.arfeen@iub.edu.pk"

  # Academic Profiles
  googlescholar    : "https://scholar.google.com/citations?hl=en&user=pjnv9wEAAAAJ"
  orcid            : "https://orcid.org/0000-0002-7359-2743"
  researchgate     : "https://www.researchgate.net/profile/Zeeshan-Arfeen"
  scopus           : "57209782654"

  # Developer / GitHub
  github           : "ZeeshanAhmadArfeen"

  # Social (keep blank if not available)
  linkedin         :
  twitter          :
  facebook         :

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Comments
comments:
  provider               :

# Feed
atom_feed:
  hide                   : false

# SEO
google_site_verification :
bing_site_verification   :

# Social Sharing
social:
  type                   : Person
  name                   : "Dr. Zeeshan Ahmad Arfeen"
  links:
    - https://scholar.google.com/citations?hl=en&user=pjnv9wEAAAAJ
    - https://orcid.org/0000-0002-7359-2743
    - https://www.researchgate.net/profile/Zeeshan-Arfeen

# Analytics
analytics:
  provider               : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - node_modules
  - vendor
  - README
  - LICENSE

# Markdown
markdown: kramdown
highlighter: rouge

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jemoji
